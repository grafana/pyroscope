name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  # for dispatching the update-homebrew-formulas workflow
  actions: write
  # issues: write

jobs:
  goreleaser:
    runs-on: ubuntu-x64-large
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: 'false'
      - name: Set GIT_LAST_COMMIT_DATE
        run: echo "GIT_LAST_COMMIT_DATE=$(git log -1 --date=iso-strict --format=%cd)" >> $GITHUB_ENV
      - name: Set IMAGE_TAG from git tag
        run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Set IMAGE_PUBLISH_LATEST=true, so we overwrite the latest docker image tag and update Homebrew
        run: echo "IMAGE_PUBLISH_LATEST=true" >> $GITHUB_ENV
      # Forces goreleaser to use the correct previous tag for the changelog
      - name: Set GORELEASER_PREVIOUS_TAG
        run: echo "GORELEASER_PREVIOUS_TAG=$(git tag -l --sort=-version:refname | grep -E '^v.*' | head -n 2 | tail -1)" >> $GITHUB_ENV
      - run: git fetch --force --tags
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.25.12"
          cache: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          package-manager-cache: false
      # setup docker buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log into GAR
        uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
        with:
          registry: us-docker.pkg.dev
      - run: make frontend/build
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          # ensure this aligns with the version specified in the /Makefile
          version: v2.13.2
          args: release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
      # Our Homebrew publishing currently assumes latest releases only. The
      # formula update runs as a separately dispatched workflow (always from
      # main, so fixes to it don't need backporting to release branches): it
      # creates the tap commit through the GitHub API so it is signed — the
      # tap's ruleset requires verified signatures and rejects plain git pushes.
      - if: env.IMAGE_PUBLISH_LATEST == 'true'
        name: Update homebrew formulas
        run: gh workflow run update-homebrew-formulas.yml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${GITHUB_REF#refs/*/}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
