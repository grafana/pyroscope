name: helm-release

on:
  push:
    branches:
      - main
      - "release-[0-9]+.[0-9]+"

jobs:
  call-update-helm-repo-pyroscope:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@77e5ea2de369fa1ff3441b08765c164be209eaa2
    permissions:
      contents: "write"
      id-token: "write"
      packages: "write"
    with:
      charts_dir: operations/pyroscope/helm/
      cr_configfile: operations/pyroscope/helm/cr.yaml
      ct_configfile: operations/pyroscope/helm/ct.yaml
      github_app: grafana-pyroscope-releases
  call-update-helm-repo-pyroscope-monitoring:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@77e5ea2de369fa1ff3441b08765c164be209eaa2
    permissions:
      contents: "write"
      id-token: "write"
      packages: "write"
    with:
      charts_dir: operations/pyroscope/helm/
      cr_configfile: operations/monitoring/helm/cr.yaml
      ct_configfile: operations/monitoring/helm/ct.yaml
      github_app: grafana-pyroscope-releases
