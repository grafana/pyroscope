syntax = "proto3";

package debuginfo.v1alpha1;

import "google/protobuf/timestamp.proto";
import "types/v1/types.proto";

service DebuginfoService {
  rpc ShouldInitiateUpload(ShouldInitiateUploadRequest) returns (ShouldInitiateUploadResponse) {}
  rpc UploadFinished(UploadFinishedRequest) returns (UploadFinishedResponse) {}
  rpc ListDebuginfo(ListDebuginfoRequest) returns (ListDebuginfoResponse) {}
}

message FileMetadata {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_EXECUTABLE_FULL = 1;
    TYPE_EXECUTABLE_NO_TEXT = 2;
  }

  // GNU build ID of the executable.
  string gnu_build_id = 1;
  // Go build ID of the executable.
  string go_build_id = 2;
  // Optional libpf.FileID from the otel profiler.
  string otel_file_id = 3;
  // Original file name of the executable.
  string name = 4;
  // Type of the debug info.
  Type type = 5;
}

message ShouldInitiateUploadRequest {
  FileMetadata file = 1;
}

message ShouldInitiateUploadResponse {
  bool should_initiate_upload = 1;
  string reason = 2;
}

message UploadFinishedRequest {
  string gnu_build_id = 1;
}

message UploadFinishedResponse {}

message ListDebuginfoRequest {}

message ListDebuginfoResponse {
  repeated ObjectMetadata object = 1;
}

// This is stored in buckets at "debug-info/$tenant/$gnu_build_id/metadata"
// Along with the actual uploaded file at "debug-info/$tenant/$gnu_build_id/exe"
message ObjectMetadata {
  FileMetadata file = 1;

  enum State {
    STATE_UPLOADING = 0;
    STATE_UPLOADED = 1;
  }

  State state = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp finished_at = 4;
  // Size of the uploaded ELF file in bytes.
  int64 size_bytes = 5;
}
