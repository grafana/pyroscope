syntax = "proto3";

package querier.v1;

import "google/v1/profile.proto";
import "querier/v1/querier.proto";

service AsyncQuerierService {
  // SelectMergeProfileAsync starts an async query or polls for results.
  // If request_id is empty, starts a new async query and returns the request_id.
  // If request_id is populated, polls for the result of the async query.
  rpc SelectMergeProfileAsync(SelectMergeProfileAsyncRequest) returns (SelectMergeProfileAsyncResponse) {}
}

message SelectMergeProfileAsyncRequest {
  SelectMergeProfileRequest request = 1;
  // If populated, request is ignored and this becomes a poll request.
  string request_id = 2;
}

enum AsyncQueryStatus {
  ASYNC_QUERY_STATUS_UNSPECIFIED = 0;
  ASYNC_QUERY_STATUS_IN_PROGRESS = 1;
  ASYNC_QUERY_STATUS_SUCCESS = 2;
  ASYNC_QUERY_STATUS_FAILURE = 3;
}

message SelectMergeProfileAsyncResponse {
  string request_id = 1;
  AsyncQueryStatus status = 2;
  string error_message = 3;
  google.v1.Profile profile = 4;
}
