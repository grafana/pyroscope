openapi: 3.1.0
info:
  title: querier.v1
  version: v1.0.0
tags:
  - name: scope/public
    description: This operation is considered part of the public API scope
  - name: scope/internal
    description: This operation is considered part of the interal API scope. There are no stability guaraentees when using those APIs.
  - name: querier.v1.QuerierStreamService
    description: |-
      QuerierStreamService is the improved streaming API for the Pyroscope query
       frontend. It supersedes the streaming RPCs in QuerierService with a simpler
       event model: clients receive only ETA, total scan size, and partial results.
paths:
  /querier.v1.QuerierStreamService/SelectMergeStacktracesStream: {}
  /querier.v1.QuerierStreamService/SelectSeriesStream: {}
components:
  schemas:
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    querier.v1.FlameGraph:
      type: object
      properties:
        names:
          type: array
          items:
            type: string
          title: names
        levels:
          type: array
          items:
            $ref: '#/components/schemas/querier.v1.Level'
          title: levels
        total:
          type:
            - integer
            - string
          title: total
          format: int64
        maxSelf:
          type:
            - integer
            - string
          title: max_self
          format: int64
      title: FlameGraph
      additionalProperties: false
    querier.v1.FlamegraphProgress:
      type: object
      properties:
        bytesTotalEstimate:
          type:
            - integer
            - string
          title: bytes_total_estimate
          format: int64
          description: |-
            Running estimate of total bytes to be scanned. Grows as index lookups
             across query-backend shards complete; treat as mutable until the stream ends.
        bytesDone:
          type:
            - integer
            - string
          title: bytes_done
          format: int64
          description: Bytes for blocks whose index lookup has completed; used to derive ETA.
        etaUnixMs:
          type:
            - integer
            - string
          title: eta_unix_ms
          format: int64
          description: Estimated completion time as Unix milliseconds. Zero until estimable.
        flamegraph:
          title: flamegraph
          description: Latest partial flamegraph. Absent until the first partial result arrives.
          $ref: '#/components/schemas/querier.v1.FlameGraph'
      title: FlamegraphProgress
      additionalProperties: false
      description: |-
        FlamegraphProgress is a periodic update emitted roughly every 500 ms while
         a SelectMergeStacktracesStream query is in progress. Each message is a full
         replacement of the previous one (not a delta). The flamegraph field is absent
         until the first partial result is available.
    querier.v1.FlamegraphStreamEvent:
      type: object
      oneOf:
        - properties:
            flamegraph:
              title: flamegraph
              $ref: '#/components/schemas/querier.v1.FlameGraph'
          title: flamegraph
          required:
            - flamegraph
        - properties:
            progress:
              title: progress
              $ref: '#/components/schemas/querier.v1.FlamegraphProgress'
          title: progress
          required:
            - progress
      title: FlamegraphStreamEvent
      additionalProperties: false
      description: |-
        FlamegraphStreamEvent is one message in a SelectMergeStacktracesStream
         response. Zero or more progress events arrive first (approximately every
         500 ms), followed by exactly one flamegraph as the final result.
    querier.v1.Level:
      type: object
      properties:
        values:
          type: array
          items:
            type:
              - integer
              - string
            format: int64
          title: values
      title: Level
      additionalProperties: false
    querier.v1.ProfileFormat:
      type: string
      title: ProfileFormat
      enum:
        - PROFILE_FORMAT_UNSPECIFIED
        - PROFILE_FORMAT_FLAMEGRAPH
        - PROFILE_FORMAT_TREE
        - PROFILE_FORMAT_DOT
    querier.v1.SelectMergeStacktracesRequest:
      type: object
      properties:
        profileTypeID:
          type: string
          examples:
            - process_cpu:cpu:nanoseconds:cpu:nanoseconds
          title: profile_typeID
          description: |-
            Profile Type ID string in the form
             <name>:<type>:<unit>:<period_type>:<period_unit>.
        labelSelector:
          type: string
          examples:
            - '{namespace="my-namespace"}'
          title: label_selector
          description: Label selector string
        start:
          type:
            - integer
            - string
          examples:
            - "1676282400000"
          title: start
          format: int64
          description: Milliseconds since epoch.
        end:
          type:
            - integer
            - string
          examples:
            - "1676289600000"
          title: end
          format: int64
          description: Milliseconds since epoch.
        maxNodes:
          type:
            - integer
            - string
          title: max_nodes
          format: int64
          description: |-
            Limit the nodes returned to only show the node with the max_node's biggest
             total
          nullable: true
        format:
          title: format
          description: |-
            Profile format specifies the format of profile to be returned.
             If not specified, the profile will be returned in flame graph format.
          $ref: '#/components/schemas/querier.v1.ProfileFormat'
        stackTraceSelector:
          title: stack_trace_selector
          description: Select stack traces that match the provided selector.
          nullable: true
          $ref: '#/components/schemas/types.v1.StackTraceSelector'
        profileIdSelector:
          type: array
          examples:
            - - 7c9e6679-7425-40de-944b-e07fc1f90ae7
          items:
            type: string
            examples:
              - - 7c9e6679-7425-40de-944b-e07fc1f90ae7
          title: profile_id_selector
          description: List of Profile UUIDs to query
      title: SelectMergeStacktracesRequest
      additionalProperties: false
    querier.v1.SelectSeriesRequest:
      type: object
      properties:
        profileTypeID:
          type: string
          examples:
            - process_cpu:cpu:nanoseconds:cpu:nanoseconds
          title: profile_typeID
          description: |-
            Profile Type ID string in the form
             <name>:<type>:<unit>:<period_type>:<period_unit>.
        labelSelector:
          type: string
          examples:
            - '{namespace="my-namespace"}'
          title: label_selector
          description: Label selector string
        start:
          type:
            - integer
            - string
          examples:
            - "1676282400000"
          title: start
          format: int64
          description: Milliseconds since epoch.
        end:
          type:
            - integer
            - string
          examples:
            - "1676289600000"
          title: end
          format: int64
          description: Milliseconds since epoch.
        groupBy:
          type: array
          examples:
            - - pod
          items:
            type: string
            examples:
              - - pod
          title: group_by
        step:
          type: number
          title: step
          format: double
        aggregation:
          title: aggregation
          description: Query resolution step width in seconds
          nullable: true
          $ref: '#/components/schemas/types.v1.TimeSeriesAggregationType'
        stackTraceSelector:
          title: stack_trace_selector
          description: Select stack traces that match the provided selector.
          nullable: true
          $ref: '#/components/schemas/types.v1.StackTraceSelector'
        limit:
          type:
            - integer
            - string
          title: limit
          format: int64
          description: Select the top N series by total value.
          nullable: true
        exemplarType:
          title: exemplar_type
          description: Type of exemplars to include in the response.
          $ref: '#/components/schemas/types.v1.ExemplarType'
      title: SelectSeriesRequest
      additionalProperties: false
    querier.v1.SeriesProgress:
      type: object
      properties:
        bytesTotalEstimate:
          type:
            - integer
            - string
          title: bytes_total_estimate
          format: int64
        bytesDone:
          type:
            - integer
            - string
          title: bytes_done
          format: int64
        etaUnixMs:
          type:
            - integer
            - string
          title: eta_unix_ms
          format: int64
        series:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.Series'
          title: series
      title: SeriesProgress
      additionalProperties: false
      description: |-
        SeriesProgress is a periodic update emitted roughly every 500 ms while a
         SelectSeriesStream query is in progress. Each message replaces the previous.
    querier.v1.SeriesStreamEvent:
      type: object
      oneOf:
        - properties:
            progress:
              title: progress
              $ref: '#/components/schemas/querier.v1.SeriesProgress'
          title: progress
          required:
            - progress
        - properties:
            result:
              title: result
              $ref: '#/components/schemas/querier.v1.SeriesStreamResult'
          title: result
          required:
            - result
      title: SeriesStreamEvent
      additionalProperties: false
      description: |-
        SeriesStreamEvent is one message in a SelectSeriesStream response.
         Zero or more progress events arrive first, followed by exactly one result.
    querier.v1.SeriesStreamResult:
      type: object
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.Series'
          title: series
      title: SeriesStreamResult
      additionalProperties: false
      description: |-
        SeriesStreamResult wraps the final series payload. A wrapper message is
         required because proto3 oneof cannot contain repeated fields directly.
    types.v1.Exemplar:
      type: object
      properties:
        timestamp:
          type:
            - integer
            - string
          examples:
            - "1730000023000"
          title: timestamp
          format: int64
          description: Milliseconds since epoch when the profile was captured.
        profileId:
          type: string
          examples:
            - 7c9e6679-7425-40de-944b-e07fc1f90ae7
          title: profile_id
          description: Unique identifier for the profile (UUID).
        spanId:
          type: string
          examples:
            - 00f067aa0ba902b7
          title: span_id
          description: Span ID if this profile was split by span during ingestion.
        value:
          type:
            - integer
            - string
          examples:
            - "2450000000"
          title: value
          format: int64
          description: Total sample value for this profile (e.g., CPU nanoseconds, bytes allocated).
        labels:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.LabelPair'
          title: labels
          description: |-
            Labels specific to this exemplar (e.g., pod name, node name). When an exemplar
             label overlaps with the series label, it is not included here.
      title: Exemplar
      additionalProperties: false
      description: |-
        Exemplar represents metadata for an individual profile sample.
         Exemplars allow users to drill down from aggregated timeline views
         to specific profile instances.
    types.v1.ExemplarType:
      type: string
      title: ExemplarType
      enum:
        - EXEMPLAR_TYPE_UNSPECIFIED
        - EXEMPLAR_TYPE_NONE
        - EXEMPLAR_TYPE_INDIVIDUAL
        - EXEMPLAR_TYPE_SPAN
    types.v1.GoPGO:
      type: object
      properties:
        keepLocations:
          type: integer
          title: keep_locations
          description: Specifies the number of leaf locations to keep.
        aggregateCallees:
          type: boolean
          title: aggregate_callees
          description: |-
            Aggregate callees causes the leaf location line number to be ignored,
             thus aggregating all callee samples (but not callers).
      title: GoPGO
      additionalProperties: false
    types.v1.LabelPair:
      type: object
      properties:
        name:
          type: string
          examples:
            - service_name
          title: name
          description: Label name
        value:
          type: string
          examples:
            - my_service
          title: value
          description: Label value
      title: LabelPair
      additionalProperties: false
    types.v1.Location:
      type: object
      properties:
        name:
          type: string
          title: name
      title: Location
      additionalProperties: false
    types.v1.Point:
      type: object
      properties:
        value:
          type: number
          title: value
          format: double
        timestamp:
          type:
            - integer
            - string
          title: timestamp
          format: int64
          description: Milliseconds unix timestamp
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.ProfileAnnotation'
          title: annotations
        exemplars:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.Exemplar'
          title: exemplars
          description: Exemplars are samples of individual profiles that contributed to this aggregated point
      title: Point
      additionalProperties: false
    types.v1.ProfileAnnotation:
      type: object
      properties:
        key:
          type: string
          title: key
          description: Annotation key [hidden]
        value:
          type: string
          title: value
          description: Annotation value [hidden]
      title: ProfileAnnotation
      additionalProperties: false
      description: |-
        Annotations provide additional metadata for a profile.

         The main differences between labels and annotations are:
           - annotations cannot be used in query selectors
           - annotation keys don't have to be unique

         Currently annotations are applied internally by distributors,
         any annotation passed via the push API will be dropped.
    types.v1.Series:
      type: object
      properties:
        labels:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.LabelPair'
          title: labels
        points:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.Point'
          title: points
      title: Series
      additionalProperties: false
    types.v1.StackTraceSelector:
      type: object
      properties:
        callSite:
          type: array
          items:
            $ref: '#/components/schemas/types.v1.Location'
          title: call_site
          description: |-
            Stack trace of the call site. Root at call_site[0].
             Only stack traces having the prefix provided will be selected.
             If empty, the filter is ignored.
        goPgo:
          title: go_pgo
          description: |-
            Stack trace selector for profiles purposed for Go PGO.
             If set, call_site is ignored.
          $ref: '#/components/schemas/types.v1.GoPGO'
      title: StackTraceSelector
      additionalProperties: false
      description: StackTraceSelector is used for filtering stack traces by locations.
    types.v1.TimeSeriesAggregationType:
      type: string
      title: TimeSeriesAggregationType
      enum:
        - TIME_SERIES_AGGREGATION_TYPE_SUM
        - TIME_SERIES_AGGREGATION_TYPE_AVERAGE
security: []
