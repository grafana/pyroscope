openapi: 3.1.0
info:
  title: debuginfo.v1alpha1
  version: v1.0.0
tags:
  - name: scope/public
    description: This operation is considered part of the public API scope
  - name: scope/internal
    description: This operation is considered part of the interal API scope. There are no stability guaraentees when using those APIs.
  - name: debuginfo.v1alpha1.DebuginfoService
paths:
  /debuginfo.v1alpha1.DebuginfoService/ShouldInitiateUpload:
    post:
      tags:
        - debuginfo.v1alpha1.DebuginfoService
      summary: ShouldInitiateUpload
      operationId: debuginfo.v1alpha1.DebuginfoService.ShouldInitiateUpload
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/debuginfo.v1alpha1.ShouldInitiateUploadRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/debuginfo.v1alpha1.ShouldInitiateUploadResponse'
  /debuginfo.v1alpha1.DebuginfoService/UploadFinished:
    post:
      tags:
        - debuginfo.v1alpha1.DebuginfoService
      summary: UploadFinished
      operationId: debuginfo.v1alpha1.DebuginfoService.UploadFinished
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/debuginfo.v1alpha1.UploadFinishedRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/debuginfo.v1alpha1.UploadFinishedResponse'
components:
  schemas:
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    debuginfo.v1alpha1.FileMetadata:
      type: object
      properties:
        gnuBuildId:
          type: string
          title: gnu_build_id
          description: GNU build ID of the executable.
        goBuildId:
          type: string
          title: go_build_id
          description: Go build ID of the executable.
        otelFileId:
          type: string
          title: otel_file_id
          description: Optional libpf.FileID from the otel profiler.
        name:
          type: string
          title: name
          description: Original file name of the executable.
        type:
          title: type
          description: Type of the debug info.
          $ref: '#/components/schemas/debuginfo.v1alpha1.FileMetadata.Type'
      title: FileMetadata
      additionalProperties: false
    debuginfo.v1alpha1.FileMetadata.Type:
      type: string
      title: Type
      enum:
        - TYPE_UNSPECIFIED
        - TYPE_EXECUTABLE_FULL
        - TYPE_EXECUTABLE_NO_TEXT
    debuginfo.v1alpha1.ShouldInitiateUploadRequest:
      type: object
      properties:
        file:
          title: file
          $ref: '#/components/schemas/debuginfo.v1alpha1.FileMetadata'
      title: ShouldInitiateUploadRequest
      additionalProperties: false
    debuginfo.v1alpha1.ShouldInitiateUploadResponse:
      type: object
      properties:
        shouldInitiateUpload:
          type: boolean
          title: should_initiate_upload
        reason:
          type: string
          title: reason
      title: ShouldInitiateUploadResponse
      additionalProperties: false
    debuginfo.v1alpha1.UploadFinishedRequest:
      type: object
      properties:
        gnuBuildId:
          type: string
          title: gnu_build_id
      title: UploadFinishedRequest
      additionalProperties: false
    debuginfo.v1alpha1.UploadFinishedResponse:
      type: object
      title: UploadFinishedResponse
      additionalProperties: false
security: []
