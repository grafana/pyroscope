services:
  pyroscope:
    # This service is generated from examples/templates/pyroscope/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/pyroscope:latest
    ports:
    - 4040:4040
  grafana-alloy:
    image: grafana/alloy:latest
    user: root
    privileged: true
    pid: host
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./config.alloy:/config.alloy
    ports:
    - 12345:12345
    command:
    - run
    - /config.alloy
    - --storage.path=/tmp/alloy
    - --server.http.listen-addr=0.0.0.0:12345
  grafana:
    # This service is generated from examples/templates/grafana/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/grafana:latest
    environment:
    - GF_PLUGINS_PREINSTALL_SYNC=grafana-pyroscope-app
    - GF_AUTH_ANONYMOUS_ENABLED=true
    - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    - GF_AUTH_DISABLE_LOGIN_FORM=true
    - GF_FEATURE_TOGGLES_ENABLE=traceToProfiles tracesEmbeddedFlameGraph
    volumes:
    - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
    - 3000:3000
