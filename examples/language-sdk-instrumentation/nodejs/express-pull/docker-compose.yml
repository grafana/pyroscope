services:
  pyroscope:
    # This service is generated from examples/_templates/pyroscope/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/pyroscope:latest
    ports:
    - 4040:4040
  alloy:
    image: grafana/alloy:latest
    volumes:
    - ./alloy.config.alloy:/etc/alloy-config/config.alloy:ro
    command:
    - run
    - /etc/alloy-config/config.alloy
    - --server.http.listen-addr=0.0.0.0:12345
    ports:
    - 12345:12345
  us-east:
    environment:
    - REGION=us-east
    build:
      context: .
  eu-north:
    environment:
    - REGION=eu-north
    build:
      context: .
  ap-south:
    environment:
    - REGION=ap-south
    build:
      context: .
  load-generator:
    build:
      context: ../
      dockerfile: Dockerfile.load-generator
    depends_on:
    - us-east
    - eu-north
    - ap-south
  grafana:
    # This service is generated from examples/_templates/grafana/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/grafana:latest
    environment:
    - GF_PLUGINS_PREINSTALL_SYNC=grafana-pyroscope-app
    - GF_AUTH_ANONYMOUS_ENABLED=true
    - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    - GF_AUTH_DISABLE_LOGIN_FORM=true
    - GF_FEATURE_TOGGLES_ENABLE=traceToProfiles tracesEmbeddedFlameGraph
    volumes:
    - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
    - 3000:3000
