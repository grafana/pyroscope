services:
  pyroscope:
    # This service is generated from examples/_templates/pyroscope/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/pyroscope:latest
    ports:
    - 4040:4040
  us-east:
    ports:
    - 5000
    environment:
    - REGION=us-east
    build:
      context: .
    links:
    - pyroscope
  eu-north:
    ports:
    - 5000
    environment:
    - REGION=eu-north
    build:
      context: .
  ap-south:
    ports:
    - 5000
    environment:
    - REGION=ap-south
    build:
      context: .
  load-generator:
    build:
      context: .
      dockerfile: Dockerfile.load-generator
    links:
    - us-east
    - ap-south
    - eu-north
  grafana:
    # This service is generated from examples/_templates/grafana/docker-compose.yml
    # Do not edit directly. To update, edit the template and run: make examples/sync-templates
    image: grafana/grafana:latest
    environment:
    - GF_PLUGINS_PREINSTALL_SYNC=grafana-pyroscope-app
    - GF_AUTH_ANONYMOUS_ENABLED=true
    - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    - GF_AUTH_DISABLE_LOGIN_FORM=true
    - GF_FEATURE_TOGGLES_ENABLE=traceToProfiles tracesEmbeddedFlameGraph
    volumes:
    - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
    - 3000:3000
